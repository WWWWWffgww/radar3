<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RADAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont;
}

#map {
  height: 100vh;
}

/* КНОПКА + */
#addBtn {
  position: absolute;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #1c1c1e;
  color: white;
  font-size: 32px;
  z-index: 1000;
}

/* ТЕМНОЕ ОКНО ДОБАВЛЕНИЯ */
#panel {
  position: absolute;
  right: 20px;
  bottom: 90px;
  width: 320px;
  z-index: 1000;

  background: rgba(28,28,30,0.96);
  backdrop-filter: blur(20px);

  padding: 16px;
  border-radius: 24px;
  display: none;
}

#panelTitle {
  color: white;
  font-size: 20px;
  font-weight: 700;
}

#panelHint {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  margin-bottom: 10px;
}

.icon-grid {
  display: flex;
  gap: 10px;
}

.icon-option {
  background: rgba(255,255,255,0.1);
  padding: 6px;
  border-radius: 14px;
  cursor: pointer;
  text-align: center;
}

.icon-option.active {
  border: 2px solid #0a84ff;
}

.icon-option img {
  width: 50px;
}

.icon-option span {
  color: white;
  font-size: 12px;
}

#descInput {
  width: 100%;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

#descCounter {
  text-align: right;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

#saveBtn {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: #007aff;
  color: white;
}

/* POPUP */
.leaflet-popup-content-wrapper {
  background: rgba(28,28,30,0.95);
  border-radius: 20px;
  color: white;
}

.leaflet-popup-tip {
  display: none;
}

.radar-popup {
  padding: 12px;
}

.popup-title {
  font-size: 18px;
  font-weight: bold;
}

.popup-desc {
  margin: 10px 0;
}

/* ЛАЙКИ */
.reaction-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.reaction-btn {
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 13px;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* КОММЕНТЫ */
.popup-input {
  width: 100%;
  border-radius: 10px;
  border: none;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

.popup-btn {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: white;
}
</style>
</head>

<body>

<div id="map"></div>
<button id="addBtn">+</button>

<div id="panel">
  <div id="panelTitle">Нова точка</div>
  <div id="panelHint">Обери тип і ткни на карту</div>

  <div class="icon-grid">
    <div class="icon-option active" data-type="safe">
      <img src="icons/safe.png"><span>Safe</span>
    </div>
    <div class="icon-option" data-type="block">
      <img src="icons/block.png"><span>Block</span>
    </div>
    <div class="icon-option" data-type="danger2">
      <img src="icons/danger2.png"><span>Danger</span>
    </div>
    <div class="icon-option" data-type="trash">
      <img src="icons/trash.png"><span>Trash</span>
    </div>
  </div>

  <textarea id="descInput" maxlength="100" placeholder="Опис..."></textarea>
  <div id="descCounter">0 / 100</div>

  <button id="saveBtn">Зберегти</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const STORAGE_KEY = "points";

const map = L.map('map').setView([50.45,30.52],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let currentType = "safe";
let selected = null;
let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

/* ИКОНКА */
function icon(type){
  return L.divIcon({
    html:`<img src="icons/${type}.png" style="width:30px">`
  });
}

/* POPUP */
function popupHtml(p,i){
  return `
  <div class="radar-popup">
    <div class="popup-title">${p.type}</div>

    <div class="popup-desc">${p.desc}</div>

    <div class="reaction-row">
      <button class="reaction-btn" onclick="vote(${i},1)">👍 ${p.likes||0}</button>
      <button class="reaction-btn" onclick="vote(${i},0)">👎 ${p.dislikes||0}</button>
    </div>

    <input id="c${i}" class="popup-input" placeholder="Коментар...">
    <button class="popup-btn" onclick="addComment(${i})">Додати</button>
  </div>
  `;
}

/* РЕНДЕР */
function render(){
  map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l); });

  data.forEach((p,i)=>{
    L.marker([p.lat,p.lng],{icon:icon(p.type)})
      .addTo(map)
      .bindPopup(popupHtml(p,i));
  });

  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

render();

/* СОЗДАНИЕ */
document.getElementById("addBtn").onclick=()=>{
  panel.style.display="block";
};

map.on("click",e=>{
  if(panel.style.display==="none") return;
  selected=e.latlng;
});

document.getElementById("saveBtn").onclick=()=>{
  if(!selected) return alert("Ткни карту");
  const desc=descInput.value.trim();
  if(!desc) return alert("Опис обязателен");

  data.push({
    lat:selected.lat,
    lng:selected.lng,
    type:currentType,
    desc,
    likes:0,
    dislikes:0,
    comments:[]
  });

  panel.style.display="none";
  descInput.value="";
  render();
};

/* КОММЕНТ */
window.addComment=(i)=>{
  let text=document.getElementById("c"+i).value;
  if(!text) return alert("Пусто");
  data[i].comments.push(text);
  render();
};

/* ЛАЙК */
window.vote=(i,t)=>{
  if(t) data[i].likes++;
  else data[i].dislikes++;
  render();
};

/* ВЫБОР ИКОНКИ */
document.querySelectorAll(".icon-option").forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll(".icon-option").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
    currentType=el.dataset.type;
  };
});

/* СЧЕТЧИК */
descInput.oninput=()=>{
  descCounter.innerText=descInput.value.length+" / 100";
};
</script>

</body>
</html>
