<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    #addBtn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background: #111;
      color: #fff;
      font-size: 32px;
      z-index: 1000;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    #panel {
      position: absolute;
      right: 20px;
      bottom: 92px;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 14px;
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
      display: none;
      width: 300px;
      z-index: 1000;
      border: 1px solid rgba(0,0,0,0.06);
    }

    #panelTitle {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #111;
    }

    #panelHint {
      font-size: 13px;
      color: #8e8e93;
      margin-bottom: 10px;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .icon-option {
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      background: #f2f2f7;
      transition: 0.15s ease;
    }

    .icon-option.active {
      border-color: #0a84ff;
      background: #eaf3ff;
    }

    .icon-option img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
      margin: 0 auto 4px;
    }

    .icon-option span {
      display: block;
      font-size: 12px;
      color: #333;
    }

    #descInput {
      width: 100%;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      border: none;
      background: #f2f2f7;
      box-sizing: border-box;
      resize: none;
      min-height: 88px;
      font-size: 15px;
      outline: none;
      color: #111;
    }

    #descCounter {
      margin-top: 6px;
      text-align: right;
      font-size: 12px;
      color: #8e8e93;
    }

    #saveBtn {
      margin-top: 12px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 16px;
      background: #0a84ff;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(10,132,255,0.25);
    }

    #saveBtn:active,
    .popup-btn:active,
    #addBtn:active {
      transform: scale(0.99);
    }

    .pin-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 22px;
      padding: 0;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 320px !important;
    }

    .leaflet-popup-tip {
      display: none;
    }

    .radar-popup {
      padding: 16px;
    }

    .popup-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #111;
    }

    .popup-time {
      font-size: 13px;
      color: #8e8e93;
      margin-bottom: 10px;
    }

    .popup-desc {
      font-size: 15px;
      margin-bottom: 14px;
      line-height: 1.4;
      color: #111;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .popup-comments-title {
      font-size: 13px;
      color: #8e8e93;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .popup-comments {
      max-height: 140px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .comment-item {
      padding: 10px;
      border-radius: 14px;
      background: #f2f2f7;
      margin-bottom: 6px;
    }

    .comment-text {
      font-size: 14px;
      color: #111;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-time {
      font-size: 11px;
      color: #8e8e93;
      margin-top: 4px;
    }

    .popup-input {
      width: 100%;
      border-radius: 14px;
      border: none;
      background: #f2f2f7;
      padding: 12px;
      font-size: 14px;
      outline: none;
      margin-bottom: 8px;
      box-sizing: border-box;
      color: #111;
    }

    .popup-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px;
      background: #0a84ff;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(10,132,255,0.25);
    }
  </style>
</head>
<body>

<div id="map"></div>

<button id="addBtn">+</button>

<div id="panel">
  <div id="panelTitle">Нова точка</div>
  <div id="panelHint">Обери тип, додай опис і ткни на карту</div>

  <div class="icon-grid">
    <div class="icon-option active" data-type="safe">
      <img src="icons/safe.png" alt="Safe">
      <span>Safe</span>
    </div>

    <div class="icon-option" data-type="block">
      <img src="icons/block.png" alt="Block">
      <span>Block</span>
    </div>

    <div class="icon-option" data-type="danger2">
      <img src="icons/danger2.png" alt="Danger">
      <span>Danger</span>
    </div>

    <div class="icon-option" data-type="trash">
      <img src="icons/trash.png" alt="Trash">
      <span>Trash</span>
    </div>
  </div>

  <textarea id="descInput" maxlength="100" placeholder="Опис обов'язковий, до 100 символів"></textarea>
  <div id="descCounter">0 / 100</div>
  <button id="saveBtn">Зберегти</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const STORAGE_KEY = 'radar_points';
  const LIFE = 24 * 60 * 60 * 1000;

  const labelMap = {
    safe: 'Безпечно',
    block: 'Перекрито',
    danger2: 'Небезпека',
    trash: 'Сміття'
  };

  const map = L.map('map').setView([50.45, 30.52], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const addBtn = document.getElementById('addBtn');
  const panel = document.getElementById('panel');
  const descInput = document.getElementById('descInput');
  const descCounter = document.getElementById('descCounter');
  const saveBtn = document.getElementById('saveBtn');
  const iconOptions = document.querySelectorAll('.icon-option');

  let addMode = false;
  let selected = null;
  let temp = null;
  let currentType = 'safe';
  let data = load();

  function getIcon(type, zoom) {
    let s = zoom < 12 ? 22 : zoom < 14 ? 28 : 34;

    return L.divIcon({
      className: '',
      html: `<img src="icons/${type}.png" class="pin-img">`,
      iconSize: [s, s],
      iconAnchor: [s / 2, s / 2]
    });
  }

  function formatDateTime(t) {
    const d = new Date(t);
    return d.toLocaleString('uk-UA', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function formatTime(t) {
    const d = new Date(t);
    return d.toLocaleTimeString('uk-UA', {
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function load() {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const filtered = raw.filter(p => Date.now() - p.time < LIFE);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
    return filtered;
  }

  function save(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function popupHtml(point, index) {
    const commentsHtml = (point.comments || []).map(c => `
      <div class="comment-item">
        <div class="comment-text">${escapeHtml(c.text)}</div>
        <div class="comment-time">${formatTime(c.time)}</div>
      </div>
    `).join('');

    return `
      <div class="radar-popup">
        <div class="popup-title">${escapeHtml(labelMap[point.type] || point.type)}</div>
        <div class="popup-time">${formatDateTime(point.time)}</div>
        <div class="popup-desc">${escapeHtml(point.desc)}</div>

        <div class="popup-comments-title">Коментарі</div>
        <div class="popup-comments">
          ${commentsHtml || '<div class="comment-item"><div class="comment-text">Немає коментарів</div></div>'}
        </div>

        <input id="commentInput_${index}" class="popup-input" maxlength="100" placeholder="Написати коментар...">
        <button class="popup-btn" onclick="addComment(${index})">Додати коментар</button>
      </div>
    `;
  }

  let markers = [];

  function render() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data = load();
    const zoom = map.getZoom();

    data.forEach((p, i) => {
      const marker = L.marker([p.lat, p.lng], {
        icon: getIcon(p.type, zoom)
      }).addTo(map);

      marker.bindPopup(popupHtml(p, i));
      markers.push(marker);
    });
  }

  window.addComment = function(index) {
    const input = document.getElementById(`commentInput_${index}`);
    if (!input) return;

    const text = input.value.trim();
    if (!text) {
      alert('Введи коментар');
      return;
    }
    if (text.length > 100) {
      alert('Максимум 100 символів');
      return;
    }

    if (!Array.isArray(data[index].comments)) {
      data[index].comments = [];
    }

    data[index].comments.push({
      text,
      time: Date.now()
    });

    save(data);
    render();
    markers[index].openPopup();
  };

  iconOptions.forEach(el => {
    el.addEventListener('click', () => {
      iconOptions.forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      currentType = el.dataset.type;

      if (temp && selected) {
        temp.setIcon(getIcon(currentType, map.getZoom()));
      }
    });
  });

  addBtn.addEventListener('click', () => {
    addMode = true;
    panel.style.display = 'block';
  });

  descInput.addEventListener('input', () => {
    descCounter.textContent = `${descInput.value.length} / 100`;
  });

  map.on('click', e => {
    if (!addMode) return;

    selected = e.latlng;

    if (temp) {
      map.removeLayer(temp);
    }

    temp = L.marker(selected, {
      icon: getIcon(currentType, map.getZoom())
    }).addTo(map);
  });

  saveBtn.addEventListener('click', () => {
    const desc = descInput.value.trim();

    if (!selected) {
      alert('Ткни на карту');
      return;
    }

    if (!desc) {
      alert("Опис обов'язковий");
      return;
    }

    if (desc.length > 100) {
      alert('Максимум 100 символів');
      return;
    }

    data.push({
      lat: selected.lat,
      lng: selected.lng,
      type: currentType,
      desc: desc,
      time: Date.now(),
      comments: []
    });

    save(data);
    render();

    if (temp) {
      map.removeLayer(temp);
      temp = null;
    }

    selected = null;
    addMode = false;
    panel.style.display = 'none';
    descInput.value = '';
    descCounter.textContent = '0 / 100';
  });

  map.on('zoomend', render);

  render();
</script>
</body>
</html>
