<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: #000;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #111;
    }

    .pin-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #addBtn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background: #1c1c1e;
      color: #fff;
      font-size: 34px;
      line-height: 1;
      z-index: 1000;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
    }

    #settingsBtn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: rgba(28,28,30,0.92);
      color: #fff;
      font-size: 22px;
      z-index: 1003;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    #pickerBar {
      position: fixed;
      right: 16px;
      bottom: 84px;
      width: 320px;
      z-index: 1001;
      display: none;
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 22px;
      padding: 10px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    #pickerTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: #fff;
      font-size: 14px;
      gap: 10px;
    }

    #pickerHint {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
    }

    #pickerClose,
    #sheetClose,
    #settingsClose {
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .picker-item {
      background: rgba(255,255,255,0.08);
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      color: #fff;
    }

    .picker-item.active {
      border-color: #0a84ff;
      background: rgba(10,132,255,0.18);
    }

    .picker-item img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      display: block;
      margin: 0 auto 4px;
    }

    .picker-item span {
      display: block;
      font-size: 12px;
    }

    #descSheet,
    #settingsSheet {
      position: fixed;
      right: 16px;
      bottom: 84px;
      width: 320px;
      z-index: 1002;
      display: none;
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      box-sizing: border-box;
    }

    #sheetHead,
    #settingsHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    #sheetLeft {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    #sheetIcon {
      width: 46px;
      height: 46px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    #sheetTitle,
    #settingsTitle {
      font-size: 18px;
      font-weight: 700;
    }

    #descInput,
    .settings-select {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 18px;
      padding: 14px 15px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    #descInput {
      resize: none;
      min-height: 96px;
    }

    #descInput::placeholder {
      color: rgba(255,255,255,0.5);
    }

    #descCounter,
    .popup-counter {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
      margin-bottom: 10px;
    }

    #saveBtn,
    #saveSettingsBtn,
    .popup-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      background: linear-gradient(180deg, #1c8cff, #007aff);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(10,132,255,0.28);
    }

    .settings-group {
      margin-bottom: 16px;
    }

    .settings-label {
      font-size: 13px;
      color: rgba(255,255,255,0.66);
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Стилі для фільтрів */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      cursor: pointer;
    }

    .filter-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .filter-item-left img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .filter-item-left span {
      font-size: 15px;
      font-weight: 500;
    }

    .filter-toggle {
      width: 44px;
      height: 26px;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      position: relative;
      transition: 0.2s;
      cursor: pointer;
    }

    .filter-toggle.active {
      background: #0a84ff;
    }

    .filter-toggle::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }

    .filter-toggle.active::after {
      left: 20px;
    }

    /* Стиль для ползунка часу */
    .time-slider-container {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
    }

    .time-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      outline: none;
    }

    .time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #0a84ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .time-slider-value {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .time-value {
      background: rgba(10,132,255,0.3);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 26px;
      padding: 0;
      box-shadow: 0 22px 50px rgba(0,0,0,0.22);
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      color: #fff;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 360px !important;
      max-width: calc(100vw - 24px) !important;
    }

    .leaflet-popup-tip,
    .leaflet-popup-close-button {
      display: none;
    }

    .radar-popup {
      padding: 16px;
      color: #fff;
    }

    .popup-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .popup-head-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-width: 0;
      flex: 1;
    }

    .popup-icon {
      width: 54px;
      height: 54px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .popup-meta {
      min-width: 0;
      flex: 1;
    }

    .popup-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
      margin-bottom: 4px;
    }

    .popup-time {
      font-size: 13px;
      color: rgba(255,255,255,0.74);
      margin-bottom: 3px;
    }

    .popup-life {
      font-size: 13px;
      color: #8be28b;
    }

    .popup-close {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .popup-desc {
      font-size: 17px;
      line-height: 1.4;
      color: #fff;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 14px;
    }

    .popup-comments-title {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .popup-comments {
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .comment-item {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px 13px;
      margin-bottom: 8px;
    }

    .comment-text {
      font-size: 15px;
      line-height: 1.35;
      color: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-time {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.58);
    }

    .reaction-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .reaction-btn {
      border: none;
      border-radius: 10px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.10);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
      font-weight: 600;
    }

    .reaction-btn.like {
      background: rgba(10,132,255,0.14);
      border: 1px solid rgba(10,132,255,0.22);
    }

    .reaction-btn.dislike {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .popup-input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
    }

    .popup-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 600px) {
      #addBtn {
        right: 14px;
        bottom: 8px;
        width: 56px;
        height: 56px;
      }

      #settingsBtn {
        top: 12px;
        right: 12px;
        width: 44px;
        height: 44px;
      }

      #pickerBar,
      #descSheet,
      #settingsSheet {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 16px);
        bottom: 8px;
      }

      .picker-item img {
        width: 42px;
        height: 42px;
      }

      .picker-item span {
        font-size: 11px;
      }

      .leaflet-popup-content {
        width: 320px !important;
      }
    }
  </style>
</head>
<body>

<div id="map"></div>

<button id="settingsBtn">⚙️</button>
<button id="addBtn">+</button>

<div id="pickerBar">
  <div id="pickerTop">
    <div id="pickerHint">Обери тип і ткни на карту</div>
    <button id="pickerClose">×</button>
  </div>

  <div class="picker-grid">
    <div class="picker-item active" data-type="safe">
      <img src="icons/safe.png" alt="Safe">
      <span>Safe</span>
    </div>
    <div class="picker-item" data-type="block">
      <img src="icons/block.png" alt="Block">
      <span>Block</span>
    </div>
    <div class="picker-item" data-type="danger2">
      <img src="icons/danger2.png" alt="Danger">
      <span>Danger</span>
    </div>
    <div class="picker-item" data-type="trash">
      <img src="icons/trash.png" alt="Trash">
      <span>Trash</span>
    </div>
  </div>
</div>

<div id="descSheet">
  <div id="sheetHead">
    <div id="sheetLeft">
      <img id="sheetIcon" src="icons/safe.png" alt="">
      <div id="sheetTitle">Безпечно</div>
    </div>
    <button id="sheetClose">×</button>
  </div>

  <textarea id="descInput" maxlength="100" placeholder="Опис..."></textarea>
  <div id="descCounter">0 / 100</div>
  <button id="saveBtn">Зберегти</button>
</div>

<div id="settingsSheet">
  <div id="settingsHead">
    <div id="settingsTitle">⚙️ Налаштування</div>
    <button id="settingsClose">×</button>
  </div>

  <div class="settings-group">
    <div class="settings-label">🌓 Тема карти</div>
    <select id="mapThemeSelect" class="settings-select">
      <option value="day">Денна</option>
      <option value="night">Нічна (темна)</option>
    </select>
  </div>

  <div class="settings-group">
    <div class="settings-label">⏱️ Фільтр за часом (ползунок)</div>
    <div class="time-slider-container">
      <input type="range" id="timeSlider" class="time-slider" min="0.5" max="24" step="0.5" value="24">
      <div class="time-slider-value">
        <span>🕒 30 хв</span>
        <span class="time-value" id="timeValue">24 год</span>
        <span>📅 24 год</span>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-label">👁️ Фільтр типів міток</div>
    <div class="filter-group" id="filterGroup">
      <div class="filter-item" data-filter-type="safe">
        <div class="filter-item-left">
          <img src="icons/safe.png" alt="">
          <span>Safe (Безпечно)</span>
        </div>
        <div class="filter-toggle" id="filterSafe"></div>
      </div>
      <div class="filter-item" data-filter-type="block">
        <div class="filter-item-left">
          <img src="icons/block.png" alt="">
          <span>Block (Перекрито)</span>
        </div>
        <div class="filter-toggle" id="filterBlock"></div>
      </div>
      <div class="filter-item" data-filter-type="danger2">
        <div class="filter-item-left">
          <img src="icons/danger2.png" alt="">
          <span>Danger (Небезпека)</span>
        </div>
        <div class="filter-toggle" id="filterDanger2"></div>
      </div>
      <div class="filter-item" data-filter-type="trash">
        <div class="filter-item-left">
          <img src="icons/trash.png" alt="">
          <span>Trash (Сміття)</span>
        </div>
        <div class="filter-toggle" id="filterTrash"></div>
      </div>
    </div>
  </div>

  <button id="saveSettingsBtn">Зберегти</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const STORAGE_KEY = 'radar_points';
  const SETTINGS_KEY = 'radar_settings';
  const LIFE = 24 * 60 * 60 * 1000;

  const labelMap = {
    safe: 'Безпечно',
    block: 'Перекрито',
    danger2: 'Небезпека',
    trash: 'Сміття'
  };

  const mapThemes = {
  day: {
    url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    attribution: '&copy; OpenStreetMap contributors'
  },
  night: {
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }
};

  const map = L.map('map').setView([50.45, 30.52], 13);
  let currentTileLayer = null;

  function loadSettings() {
    const defaultSettings = {
      mapTheme: 'night',
      timeFilterHours: 24,
      filters: {
        safe: true,
        block: true,
        danger2: true,
        trash: true
      }
    };
    try {
      const saved = localStorage.getItem(SETTINGS_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        return { 
          ...defaultSettings, 
          ...parsed, 
          filters: { ...defaultSettings.filters, ...(parsed.filters || {}) },
          timeFilterHours: parsed.timeFilterHours || 24
        };
      }
    } catch(e) {}
    return defaultSettings;
  }

  function saveSettings(settings) {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }

  let settings = loadSettings();

  function applyMapTheme(theme) {
    if (currentTileLayer) {
      map.removeLayer(currentTileLayer);
    }
    currentTileLayer = L.tileLayer(mapThemes[theme].url, {
      attribution: mapThemes[theme].attribution
    }).addTo(map);
  }

  applyMapTheme(settings.mapTheme);

  const addBtn = document.getElementById('addBtn');
  const settingsBtn = document.getElementById('settingsBtn');

  const pickerBar = document.getElementById('pickerBar');
  const pickerClose = document.getElementById('pickerClose');
  const pickerItems = document.querySelectorAll('.picker-item');

  const descSheet = document.getElementById('descSheet');
  const sheetClose = document.getElementById('sheetClose');
  const sheetIcon = document.getElementById('sheetIcon');
  const sheetTitle = document.getElementById('sheetTitle');
  const descInput = document.getElementById('descInput');
  const descCounter = document.getElementById('descCounter');
  const saveBtn = document.getElementById('saveBtn');

  const settingsSheet = document.getElementById('settingsSheet');
  const settingsClose = document.getElementById('settingsClose');
  const mapThemeSelect = document.getElementById('mapThemeSelect');
  const timeSlider = document.getElementById('timeSlider');
  const timeValue = document.getElementById('timeValue');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');

  let addMode = false;
  let selected = null;
  let temp = null;
  let currentType = 'safe';
  let data = load();

  mapThemeSelect.value = settings.mapTheme;
  
  // Встановлюємо значення ползунка
  timeSlider.value = settings.timeFilterHours;
  updateTimeDisplay(settings.timeFilterHours);

  function updateTimeDisplay(hours) {
    if (hours < 1) {
      const minutes = Math.round(hours * 60);
      timeValue.textContent = `${minutes} хв`;
    } else {
      timeValue.textContent = `${hours} год`;
    }
  }

  timeSlider.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    updateTimeDisplay(val);
  });

  function updateFilterUI() {
    const filterIds = {
      safe: 'filterSafe',
      block: 'filterBlock',
      danger2: 'filterDanger2',
      trash: 'filterTrash'
    };
    for (const [type, id] of Object.entries(filterIds)) {
      const toggle = document.getElementById(id);
      if (toggle) {
        if (settings.filters[type]) {
          toggle.classList.add('active');
        } else {
          toggle.classList.remove('active');
        }
      }
    }
  }

  function initFilterToggles() {
    const filterItems = document.querySelectorAll('.filter-item');
    filterItems.forEach(item => {
      const type = item.dataset.filterType;
      const toggle = item.querySelector('.filter-toggle');
      if (toggle) {
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          settings.filters[type] = !settings.filters[type];
          updateFilterUI();
          render();
        });
      }
      item.addEventListener('click', (e) => {
        if (e.target !== toggle) {
          settings.filters[type] = !settings.filters[type];
          updateFilterUI();
          render();
        }
      });
    });
  }

  function getIcon(type, zoom) {
    let s = zoom < 12 ? 22 : zoom < 14 ? 28 : 34;
    return L.divIcon({
      className: '',
      html: `<img src="icons/${type}.png" class="pin-img">`,
      iconSize: [s, s],
      iconAnchor: [s / 2, s / 2]
    });
  }

  function formatDateTime(t) {
    return new Date(t).toLocaleString('uk-UA', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function formatTime(t) {
    return new Date(t).toLocaleTimeString('uk-UA', {
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function load() {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const filtered = raw.filter(p => Date.now() - p.time < LIFE);
    if (filtered.length !== raw.length) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
    }
    return filtered;
  }

  function save(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function timeLeftText(createdAt) {
    const end = createdAt + LIFE;
    const left = end - Date.now();
    if (left <= 0) return 'Закінчилась';

    const hours = Math.floor(left / (1000 * 60 * 60));
    const minutes = Math.floor((left % (1000 * 60 * 60)) / (1000 * 60));
    return `ще ${hours}:${String(minutes).padStart(2, '0')} год`;
  }

  function popupHtml(point, index) {
    const commentsHtml = (point.comments || []).map(c => `
      <div class="comment-item">
        <div class="comment-text">${escapeHtml(c.text)}</div>
        <div class="comment-time">${formatTime(c.time)}</div>
      </div>
    `).join('');

    return `
      <div class="radar-popup">
        <div class="popup-head">
          <div class="popup-head-left">
            <img src="icons/${point.type}.png" class="popup-icon">
            <div class="popup-meta">
              <div class="popup-title">${escapeHtml(labelMap[point.type] || point.type)}</div>
              <div class="popup-time">${formatDateTime(point.time)}</div>
              <div class="popup-life">${timeLeftText(point.time)}</div>
            </div>
          </div>

          <button class="popup-close" onclick="closePopup()">×</button>
        </div>

        <div class="popup-desc">${escapeHtml(point.desc || '')}</div>

        <div class="popup-comments-title">Коментарі</div>

        <div class="popup-comments">
          ${commentsHtml || '<div class="comment-item"><div class="comment-text">Немає коментарів</div></div>'}
        </div>

        <div class="reaction-row">
          <button class="reaction-btn like" onclick="vote(${index}, 'like')">👍 ${point.likes || 0}</button>
          <button class="reaction-btn dislike" onclick="vote(${index}, 'dislike')">👎 ${point.dislikes || 0}</button>
        </div>

        <input id="commentInput_${index}" class="popup-input" maxlength="100" placeholder="Написати коментар...">
        <div class="popup-counter" id="commentCounter_${index}">0 / 100</div>
        <button class="popup-btn" onclick="addComment(${index})">Додати коментар</button>
      </div>
    `;
  }

  let markers = [];

  function render() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data = load();
    const zoom = map.getZoom();
    const now = Date.now();
    const timeLimit = settings.timeFilterHours * 60 * 60 * 1000;

    data.forEach((p, i) => {
      if (!settings.filters[p.type]) return;
      if (now - p.time > timeLimit) return;

      const marker = L.marker([p.lat, p.lng], {
        icon: getIcon(p.type, zoom)
      }).addTo(map);

      marker.bindPopup(popupHtml(p, i));

      marker.on('popupopen', () => {
        setTimeout(() => {
          const input = document.getElementById(`commentInput_${i}`);
          const counter = document.getElementById(`commentCounter_${i}`);
          if (input && counter) {
            input.addEventListener('input', () => {
              counter.textContent = `${input.value.length} / 100`;
            });
          }
        }, 10);
      });

      markers.push(marker);
    });
  }

  function updatePickerActive() {
    pickerItems.forEach(x => x.classList.remove('active'));
    document.querySelector(`.picker-item[data-type="${currentType}"]`)?.classList.add('active');
    sheetIcon.src = `icons/${currentType}.png`;
    sheetTitle.textContent = labelMap[currentType] || currentType;
    if (temp && selected) {
      temp.setIcon(getIcon(currentType, map.getZoom()));
    }
  }

  function closeCreateMode() {
    addMode = false;
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
    addBtn.style.display = 'block';
    selected = null;
    descInput.value = '';
    descCounter.textContent = '0 / 100';
    if (temp) {
      map.removeLayer(temp);
      temp = null;
    }
  }

  window.closePopup = function() {
    map.closePopup();
  };

  window.vote = function(index, type) {
    data = load();
    if (!data[index]) return;
    
    if (type === 'like') {
      data[index].likes = (data[index].likes || 0) + 1;
    } else {
      data[index].dislikes = (data[index].dislikes || 0) + 1;
    }
    save(data);
    render();
    if (markers[index]) markers[index].openPopup();
  };

  window.addComment = function(index) {
    const input = document.getElementById(`commentInput_${index}`);
    if (!input) return;

    const text = input.value.trim();
    if (!text) {
      alert('Коментар обовʼязковий');
      return;
    }
    if (text.length > 100) {
      alert('Максимум 100 символів');
      return;
    }

    data = load();
    if (!data[index]) return;

    if (!Array.isArray(data[index].comments)) {
      data[index].comments = [];
    }

    data[index].comments.push({
      text,
      time: Date.now()
    });

    save(data);
    render();
    if (markers[index]) markers[index].openPopup();
  };

  pickerItems.forEach(el => {
    el.addEventListener('click', () => {
      currentType = el.dataset.type;
      updatePickerActive();
    });
  });

  addBtn.addEventListener('click', () => {
    addMode = true;
    addBtn.style.display = 'none';
    settingsSheet.style.display = 'none';
    pickerBar.style.display = 'block';
    descSheet.style.display = 'none';
  });

  settingsBtn.addEventListener('click', () => {
    settingsSheet.style.display = 'block';
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
  });

  pickerClose.addEventListener('click', closeCreateMode);
  sheetClose.addEventListener('click', closeCreateMode);
  settingsClose.addEventListener('click', () => {
    settingsSheet.style.display = 'none';
  });

  saveSettingsBtn.addEventListener('click', () => {
    settings.mapTheme = mapThemeSelect.value;
    settings.timeFilterHours = parseFloat(timeSlider.value);
    saveSettings(settings);
    applyMapTheme(settings.mapTheme);
    render();
    settingsSheet.style.display = 'none';
  });

  descInput.addEventListener('input', () => {
    descCounter.textContent = `${descInput.value.length} / 100`;
  });

  map.on('click', e => {
    if (!addMode) return;

    selected = e.latlng;

    if (temp) {
      map.removeLayer(temp);
    }

    temp = L.marker(selected, {
      icon: getIcon(currentType, map.getZoom())
    }).addTo(map);

    updatePickerActive();
    descSheet.style.display = 'block';
  });

  saveBtn.addEventListener('click', () => {
    const desc = descInput.value.trim();

    if (!selected) {
      alert('Ткни на карту');
      return;
    }

    if (!desc) {
      alert("Опис обов'язковий");
      return;
    }

    if (desc.length > 100) {
      alert('Максимум 100 символів');
      return;
    }

    data = load();
    data.push({
      lat: selected.lat,
      lng: selected.lng,
      type: currentType,
      desc: desc,
      time: Date.now(),
      comments: [],
      likes: 0,
      dislikes: 0
    });

    save(data);
    render();
    closeCreateMode();
  });

  map.on('zoomend', () => {
    render();
  });

  setInterval(() => {
    render();
  }, 60000);

  updateFilterUI();
  initFilterToggles();
  updatePickerActive();
  render();
</script>
</body>
</html>
