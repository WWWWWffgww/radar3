<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>RADAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root {
      --bg-dark: rgba(28, 28, 30, 0.94);
      --bg-dark-2: rgba(44, 44, 46, 0.96);
      --bg-soft: rgba(255,255,255,0.10);
      --bg-soft-2: rgba(255,255,255,0.14);
      --text-main: #fff;
      --text-soft: rgba(255,255,255,0.68);
      --text-dim: rgba(255,255,255,0.5);
      --blue-1: #1c8cff;
      --blue-2: #0066ff;
      --green: #7CFF66;
      --shadow: 0 18px 40px rgba(0,0,0,0.22);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .pin-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .glass-card {
      background: var(--bg-dark);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      color: var(--text-main);
    }

    #addBtn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background: #1c1c1e;
      color: #fff;
      font-size: 34px;
      line-height: 1;
      z-index: 1000;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
    }

    #settingsBtn {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 18px;
      height: 18px;
      border: none;
      background: transparent;
      color: #d9d9de;
      font-size: 18px;
      line-height: 1;
      z-index: 1003;
      cursor: pointer;
      padding: 0;
    }

    #settingsBtn:hover {
      color: #fff;
    }

    #pickerBar {
      position: fixed;
      right: 16px;
      bottom: 84px;
      width: 328px;
      z-index: 1001;
      display: none;
      border-radius: 22px;
      padding: 10px;
      box-sizing: border-box;
    }

    #pickerTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #pickerHint {
      color: var(--text-soft);
      font-size: 13px;
    }

    .icon-close {
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .picker-item {
      background: var(--bg-soft);
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      color: #fff;
      user-select: none;
    }

    .picker-item.active {
      border-color: #0a84ff;
      background: rgba(10,132,255,0.18);
    }

    .picker-item img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
      margin: 0 auto 4px;
    }

    .picker-item span {
      display: block;
      font-size: 12px;
    }

    #descSheet,
    #settingsSheet {
      position: fixed;
      right: 16px;
      bottom: 84px;
      width: 328px;
      z-index: 1002;
      display: none;
      border-radius: var(--radius-xl);
      padding: 14px;
      box-sizing: border-box;
    }

    #sheetHead,
    #settingsHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    #sheetLeft {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    #sheetIcon {
      width: 44px;
      height: 44px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    #sheetTitle,
    #settingsTitle {
      font-size: 18px;
      font-weight: 700;
    }

    #descInput,
    .popup-input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      resize: none;
      border-radius: 18px;
      padding: 14px 15px;
      background: var(--bg-soft-2);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    #descInput {
      min-height: 96px;
    }

    #descInput::placeholder,
    .popup-input::placeholder {
      color: var(--text-dim);
    }

    #descCounter,
    .popup-counter {
      text-align: right;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .primary-btn,
    .popup-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      background: linear-gradient(180deg, var(--blue-1), var(--blue-2));
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(10,132,255,0.28);
    }

    .settings-group {
      margin-bottom: 14px;
    }

    .settings-label {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .theme-row {
      display: flex;
      gap: 8px;
    }

    .theme-btn {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: var(--bg-soft);
      color: #fff;
    }

    .theme-btn.active {
      background: rgba(10,132,255,0.22);
      border: 1px solid rgba(10,132,255,0.30);
    }

    .leaflet-popup-content-wrapper {
      border-radius: 26px;
      padding: 0;
      box-shadow: 0 22px 50px rgba(0,0,0,0.22);
      background: var(--bg-dark);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      color: #fff;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 360px !important;
      max-width: calc(100vw - 24px) !important;
    }

    .leaflet-popup-tip,
    .leaflet-popup-close-button {
      display: none;
    }

    .radar-popup {
      padding: 16px;
      color: #fff;
    }

    .popup-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .popup-head-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-width: 0;
      flex: 1;
    }

    .popup-icon {
      width: 52px;
      height: 52px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .popup-meta {
      min-width: 0;
      flex: 1;
    }

    .popup-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
      margin-bottom: 4px;
    }

    .popup-time {
      font-size: 13px;
      color: rgba(255,255,255,0.74);
      margin-bottom: 3px;
    }

    .popup-life {
      font-size: 13px;
      color: var(--green);
    }

    .popup-close {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .popup-desc {
      font-size: 17px;
      line-height: 1.4;
      color: #fff;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 14px;
    }

    .popup-comments-title {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .popup-comments {
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .comment-item {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px 13px;
      margin-bottom: 8px;
    }

    .comment-text {
      font-size: 15px;
      line-height: 1.35;
      color: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-time {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.58);
    }

    .reaction-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .reaction-btn {
      border: none;
      border-radius: 10px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.10);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
      font-weight: 600;
    }

    .reaction-btn.like {
      background: rgba(10,132,255,0.14);
      border: 1px solid rgba(10,132,255,0.22);
    }

    .reaction-btn.dislike {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 600px) {
      #addBtn {
        right: 14px;
        bottom: 8px;
        width: 56px;
        height: 56px;
      }

      #settingsBtn {
        top: 12px;
        right: 12px;
        width: 18px;
        height: 18px;
        font-size: 18px;
      }

      #pickerBar,
      #descSheet,
      #settingsSheet {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 16px);
        bottom: 8px;
      }

      .picker-item img {
        width: 42px;
        height: 42px;
      }

      .picker-item span {
        font-size: 11px;
      }

      .leaflet-popup-content {
        width: 320px !important;
      }
    }
  </style>
</head>
<body>

<div id="map"></div>

<button id="settingsBtn" aria-label="Налаштування">⚙</button>
<button id="addBtn" aria-label="Додати">+</button>

<div id="pickerBar" class="glass-card">
  <div id="pickerTop">
    <div id="pickerHint">Обери тип і ткни на карту</div>
    <button id="pickerClose" class="icon-close">×</button>
  </div>

  <div class="picker-grid">
    <div class="picker-item active" data-type="safe">
      <img src="icons/safe.png" alt="Safe">
      <span>Safe</span>
    </div>
    <div class="picker-item" data-type="block">
      <img src="icons/block.png" alt="Block">
      <span>Block</span>
    </div>
    <div class="picker-item" data-type="danger2">
      <img src="icons/danger2.png" alt="Danger">
      <span>Danger</span>
    </div>
    <div class="picker-item" data-type="trash">
      <img src="icons/trash.png" alt="Trash">
      <span>Trash</span>
    </div>
  </div>
</div>

<div id="descSheet" class="glass-card">
  <div id="sheetHead">
    <div id="sheetLeft">
      <img id="sheetIcon" src="icons/safe.png" alt="">
      <div id="sheetTitle">Безпечно</div>
    </div>
    <button id="sheetClose" class="icon-close">×</button>
  </div>

  <textarea id="descInput" maxlength="100" placeholder="Опис..."></textarea>
  <div id="descCounter">0 / 100</div>
  <button id="saveBtn" class="primary-btn">Зберегти</button>
</div>

<div id="settingsSheet" class="glass-card">
  <div id="settingsHead">
    <div id="settingsTitle">Налаштування</div>
    <button id="settingsClose" class="icon-close">×</button>
  </div>

  <div class="settings-group">
    <div class="settings-label">Тема карти</div>
    <div class="theme-row">
      <button id="themeDayBtn" class="theme-btn active" data-theme="day">Денна</button>
      <button id="themeNightBtn" class="theme-btn" data-theme="night">Нічна</button>
    </div>
  </div>

  <button id="saveSettingsBtn" class="primary-btn">Зберегти</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const STORAGE_KEY = 'radar_points';
  const SETTINGS_KEY = 'radar_settings';
  const LIFE = 24 * 60 * 60 * 1000;

  const labelMap = {
    safe: 'Безпечно',
    block: 'Перекрито',
    danger2: 'Небезпека',
    trash: 'Сміття'
  };

  const mapThemes = {
    day: {
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors'
    },
    night: {
      url: 'https://tiles.stadiamaps.com/tiles/alidade_dark/{z}/{x}/{y}{r}.png',
      attribution: '&copy; Stadia Maps &copy; OpenMapTiles &copy; OpenStreetMap contributors'
    }
  };

  const map = L.map('map', { zoomControl: true }).setView([50.45, 30.52], 13);
  let currentTileLayer = null;

  function loadSettings() {
    return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"mapTheme":"day"}');
  }

  function saveSettings(settings) {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }

  let settings = loadSettings();
  let pendingTheme = settings.mapTheme || 'day';

  function applyMapTheme(theme) {
    if (currentTileLayer) {
      map.removeLayer(currentTileLayer);
    }
    currentTileLayer = L.tileLayer(mapThemes[theme].url, {
      attribution: mapThemes[theme].attribution
    }).addTo(map);
  }

  function updateThemeButtons(theme) {
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.theme === theme);
    });
  }

  applyMapTheme(pendingTheme);
  updateThemeButtons(pendingTheme);

  const addBtn = document.getElementById('addBtn');
  const settingsBtn = document.getElementById('settingsBtn');

  const pickerBar = document.getElementById('pickerBar');
  const pickerClose = document.getElementById('pickerClose');
  const pickerItems = document.querySelectorAll('.picker-item');

  const descSheet = document.getElementById('descSheet');
  const sheetClose = document.getElementById('sheetClose');
  const sheetIcon = document.getElementById('sheetIcon');
  const sheetTitle = document.getElementById('sheetTitle');
  const descInput = document.getElementById('descInput');
  const descCounter = document.getElementById('descCounter');
  const saveBtn = document.getElementById('saveBtn');

  const settingsSheet = document.getElementById('settingsSheet');
  const settingsClose = document.getElementById('settingsClose');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  const themeBtns = document.querySelectorAll('.theme-btn');

  let addMode = false;
  let selected = null;
  let temp = null;
  let currentType = 'safe';
  let data = load();

  function getIcon(type, zoom) {
    let s = zoom < 12 ? 22 : zoom < 14 ? 28 : 34;
    return L.divIcon({
      className: '',
      html: `<img src="icons/${type}.png" class="pin-img">`,
      iconSize: [s, s],
      iconAnchor: [s / 2, s / 2]
    });
  }

  function formatDateTime(t) {
    return new Date(t).toLocaleString('uk-UA', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function formatTime(t) {
    return new Date(t).toLocaleTimeString('uk-UA', {
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function load() {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const filtered = raw.filter(p => Date.now() - p.time < LIFE);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
    return filtered;
  }

  function save(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function timeLeftText(createdAt) {
    const end = createdAt + LIFE;
    const left = end - Date.now();
    if (left <= 0) return 'Закінчилась';

    const hours = Math.floor(left / (1000 * 60 * 60));
    const minutes = Math.floor((left % (1000 * 60 * 60)) / (1000 * 60));
    return `ще ${hours}:${String(minutes).padStart(2, '0')} год`;
  }

  function popupHtml(point, index) {
    const commentsHtml = (point.comments || []).map(c => `
      <div class="comment-item">
        <div class="comment-text">${escapeHtml(c.text)}</div>
        <div class="comment-time">${formatTime(c.time)}</div>
      </div>
    `).join('');

    return `
      <div class="radar-popup">
        <div class="popup-head">
          <div class="popup-head-left">
            <img src="icons/${point.type}.png" class="popup-icon">
            <div class="popup-meta">
              <div class="popup-title">${escapeHtml(labelMap[point.type] || point.type)}</div>
              <div class="popup-time">${formatDateTime(point.time)}</div>
              <div class="popup-life">${timeLeftText(point.time)}</div>
            </div>
          </div>

          <button class="popup-close" onclick="closePopup()">×</button>
        </div>

        <div class="popup-desc">${escapeHtml(point.desc || '')}</div>

        <div class="popup-comments-title">Коментарі</div>

        <div class="popup-comments">
          ${commentsHtml || '<div class="comment-item"><div class="comment-text">Немає коментарів</div></div>'}
        </div>

        <div class="reaction-row">
          <button class="reaction-btn like" onclick="vote(${index}, 'like')">👍 ${point.likes || 0}</button>
          <button class="reaction-btn dislike" onclick="vote(${index}, 'dislike')">👎 ${point.dislikes || 0}</button>
        </div>

        <input id="commentInput_${index}" class="popup-input" maxlength="100" placeholder="Написати коментар...">
        <div class="popup-counter" id="commentCounter_${index}">0 / 100</div>
        <button class="popup-btn" onclick="addComment(${index})">Додати коментар</button>
      </div>
    `;
  }

  let markers = [];

  function render() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data = load();
    const zoom = map.getZoom();

    data.forEach((p, i) => {
      const marker = L.marker([p.lat, p.lng], {
        icon: getIcon(p.type, zoom)
      }).addTo(map);

      marker.bindPopup(popupHtml(p, i));

      marker.on('popupopen', () => {
        const input = document.getElementById(`commentInput_${i}`);
        const counter = document.getElementById(`commentCounter_${i}`);
        if (input && counter) {
          input.addEventListener('input', () => {
            counter.textContent = `${input.value.length} / 100`;
          });
        }
      });

      markers.push(marker);
    });
  }

  function updatePickerActive() {
    pickerItems.forEach(x => x.classList.remove('active'));
    document.querySelector(`.picker-item[data-type="${currentType}"]`)?.classList.add('active');
    sheetIcon.src = `icons/${currentType}.png`;
    sheetTitle.textContent = labelMap[currentType] || currentType;
    if (temp && selected) {
      temp.setIcon(getIcon(currentType, map.getZoom()));
    }
  }

  function closeCreateMode() {
    addMode = false;
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
    addBtn.style.display = 'block';
    selected = null;
    descInput.value = '';
    descCounter.textContent = '0 / 100';
    if (temp) {
      map.removeLayer(temp);
      temp = null;
    }
  }

  window.closePopup = function() {
    map.closePopup();
  };

  window.vote = function(index, type) {
    if (type === 'like') {
      data[index].likes = (data[index].likes || 0) + 1;
    } else {
      data[index].dislikes = (data[index].dislikes || 0) + 1;
    }
    save(data);
    render();
    markers[index].openPopup();
  };

  window.addComment = function(index) {
    const input = document.getElementById(`commentInput_${index}`);
    if (!input) return;

    const text = input.value.trim();
    if (!text) {
      alert('Коментар обовʼязковий');
      return;
    }
    if (text.length > 100) {
      alert('Максимум 100 символів');
      return;
    }

    if (!Array.isArray(data[index].comments)) {
      data[index].comments = [];
    }

    data[index].comments.push({
      text,
      time: Date.now()
    });

    save(data);
    render();
    markers[index].openPopup();
  };

  pickerItems.forEach(el => {
    el.addEventListener('click', () => {
      currentType = el.dataset.type;
      updatePickerActive();
    });
  });

  themeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      pendingTheme = btn.dataset.theme;
      updateThemeButtons(pendingTheme);
    });
  });

  addBtn.addEventListener('click', () => {
    addMode = true;
    addBtn.style.display = 'none';
    settingsSheet.style.display = 'none';
    pickerBar.style.display = 'block';
    descSheet.style.display = 'none';
  });

  settingsBtn.addEventListener('click', () => {
    settingsSheet.style.display = 'block';
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
  });

  pickerClose.addEventListener('click', closeCreateMode);
  sheetClose.addEventListener('click', closeCreateMode);
  settingsClose.addEventListener('click', () => {
    settingsSheet.style.display = 'none';
  });

  saveSettingsBtn.addEventListener('click', () => {
    settings.mapTheme = pendingTheme;
    saveSettings(settings);
    applyMapTheme(settings.mapTheme);
    settingsSheet.style.display = 'none';
  });

  descInput.addEventListener('input', () => {
    descCounter.textContent = `${descInput.value.length} / 100`;
  });

  map.on('click', e => {
    if (!addMode) return;

    selected = e.latlng;

    if (temp) {
      map.removeLayer(temp);
    }

    temp = L.marker(selected, {
      icon: getIcon(currentType, map.getZoom())
    }).addTo(map);

    updatePickerActive();
    descSheet.style.display = 'block';
  });

  saveBtn.addEventListener('click', () => {
    const desc = descInput.value.trim();

    if (!selected) {
      alert('Ткни на карту');
      return;
    }

    if (!desc) {
      alert("Опис обов'язковий");
      return;
    }

    if (desc.length > 100) {
      alert('Максимум 100 символів');
      return;
    }

    data.push({
      lat: selected.lat,
      lng: selected.lng,
      type: currentType,
      desc: desc,
      time: Date.now(),
      comments: [],
      likes: 0,
      dislikes: 0
    });

    save(data);
    render();
    closeCreateMode();
  });

  map.on('zoomend', render);

  setInterval(() => {
    render();
  }, 60000);

  updatePickerActive();
  render();
</script>
</body>
</html>
