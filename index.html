<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: #f2f2f7;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #e5e5ea;
    }

    .pin-img {
      width: 100%;
      height: 100%;

      display: block;
    }

    #addBtn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background: rgba(28,28,30,0.6);
      color: #fff;
      font-size: 34px;
      line-height: 1;
      z-index: 1000;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);

      -webkit-backdrop-filter: blur(10px);
    }

    #settingsBtn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 22px;
      z-index: 1003;

      align-items: center;
      justify-content: center;

    }

    #settingsBtn::before {
      content: "";

      width: 31px;   /* было визуально ~48, стало примерно на 35% меньше */
      height: 31px;
      border-radius: 50%;

      backdrop-filter: blur(10px);

    }

    #pickerBar {
      position: fixed;
      right: 16px;
      bottom: 86px;
      width: 320px;
      z-index: 1001;
      display: none;
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 22px;
      padding: 10px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    #descSheet {
      position: fixed;
      right: 16px;
      bottom: 86px;
      width: 320px;
      z-index: 1002;
      display: none;
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      box-sizing: border-box;
    }

    #settingsSheet {
      position: fixed;
      top: 72px;
      right: 16px;
      width: 320px;
      z-index: 1002;
      display: none;
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;

    #pickerTop {
      display: flex;
      justify-content: space-between;
      align-items: center;

    #pickerHint {

    #pickerClose,
    #sheetClose,

      height: 30px;
      border-radius: 50%;

      line-height: 1;

    }

    .picker-grid {

    }

    .picker-item {

    .picker-item.active {

    }

    .picker-item img {

      height: 48px;

      display: block;
      margin: 0 auto 4px;
    }

    .picker-item span {
      display: block;
      font-size: 12px;
    }

    #sheetHead,
    #settingsHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    #sheetLeft {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    #sheetIcon {
      width: 46px;
      height: 46px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    #sheetTitle,
    #settingsTitle {
      font-size: 18px;
      font-weight: 700;
    }

    #descInput {
      width: 100%;
      box-sizing: border-box;
      border: none;

      padding: 14px 15px;

      color: #fff;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      resize: none;

    }

    #descCounter,

      font-size: 12px;

      margin-top: 6px;
      margin-bottom: 10px;
    }

    #saveBtn,
    #saveSettingsBtn,

      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      background: linear-gradient(180deg, #1c8cff, #007aff);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(10,132,255,0.28);
    }

    .settings-group {
      margin-bottom: 16px;
    }

    .settings-label {

      color: rgba(255,255,255,0.66);
      margin-bottom: 8px;

    }

    .filter-group {
      display: flex;
      flex-direction: column;

      margin-top: 8px;
    }

    .filter-item {
      display: flex;

      padding: 8px 12px;

    }

    .filter-item-left {
      display: flex;

    }

    .filter-item-left img {

    }

    #themeIcon {

      text-align: center;
      font-size: 22px;

      display: inline-block;
    }

    .filter-toggle {
      width: 44px;
      height: 26px;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      position: relative;
      transition: 0.2s;
      cursor: pointer;
    }

    .filter-toggle.active {
      background: #0a84ff;
    }

    .filter-toggle::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }

    .filter-toggle.active::after {

    }

      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
    }

    .time-slider {
      width: 100%;
      height: 4px;

      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      outline: none;
    }

    .time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;

      height: 20px;
      background: #0a84ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .time-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #0a84ff;

      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);

    .time-slider-value {
      display: flex;

      align-items: center;
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);

    }

    .time-value {

      padding: 4px 12px;
      border-radius: 20px;

    }

    .leaflet-popup-content-wrapper {
      border-radius: 26px;

      box-shadow: 0 22px 50px rgba(0,0,0,0.22);

    .leaflet-popup-content {

    .popup-time-row {

      align-items: center;

    }

    .popup-time {
      font-size: 13px;

    }

.popup-life {
  font-size: 11px;
  color: #8be28b;
  white-space: nowrap;
  font-weight: 600;
}

    .popup-close {
      width: 34px;

      border: none;
      border-radius: 50%;

      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .popup-desc {
      font-size: 17px;

      white-space: pre-wrap;

    .popup-comments-title {

    }

    .popup-comments {
      max-height: 160px;

      margin-bottom: 12px;

    .comment-item {
      background: rgba(255,255,255,0.08);

    }

    .comment-text {
      font-size: 15px;

    }

    .comment-time {
      margin-top: 6px;

    }

    .reaction-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .reaction-btn {
      border: none;
      border-radius: 10px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.10);
      color: #fff;

      align-items: center;

      font-weight: 600;
    }

    .reaction-btn.like {
      background: rgba(10,132,255,0.14);
      border: 1px solid rgba(10,132,255,0.22);
    }

    .reaction-btn.dislike {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .reaction-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .popup-input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
    }

    .popup-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 600px) {
      #addBtn {
        right: 14px;
        bottom: 8px;
        width: 56px;
        height: 56px;
      }

      #settingsBtn {
        top: 12px;
        right: 12px;

      }

      #settingsBtn::before {

      .picker-item span {

      .leaflet-popup-content {

      }

  </style>
</head>

<button id="saveSettingsBtn">Зберегти</button>
  
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    doc,
    updateDoc,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAX_n3xk2Jy-WqEw887Vo2k9wiw4K5tPk8",
    authDomain: "qwertyuio-a06d6.firebaseapp.com",
    projectId: "qwertyuio-a06d6",
    storageBucket: "qwertyuio-a06d6.firebasestorage.app",
    messagingSenderId: "614323966066",
    appId: "1:614323966066:web:4bd788db83dd759940b2eb",
    measurementId: "G-P1FWYRC2PL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const SETTINGS_KEY = 'radar_settings';
  const LIFE = 24 * 60 * 60 * 1000;
  const VOTES_KEY = 'radar_votes';

const labelMap = {
  safe: 'Безпечно',
  block: 'Блокпост',
  danger2: 'Злодій',
  trash: 'Сміття'
};

  const mapThemes = {
    day: {
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors'
    },
    night: {
      url: 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }
  };

  const map = L.map('map').setView([50.45, 30.52], 13);
  let currentTileLayer = null;

  function loadSettings() {
    const defaultSettings = {
      mapTheme: 'day',
      timeFilterMinutes: 1440,
      filters: {
        safe: true,
        block: true,
        danger2: true,
        trash: true
      }
    };

    try {
      const saved = localStorage.getItem(SETTINGS_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);

        let timeFilterMinutes = 1440;

        if (typeof parsed.timeFilterMinutes === 'number') {
          timeFilterMinutes = parsed.timeFilterMinutes;
        } else if (typeof parsed.timeFilterHours === 'number') {
          timeFilterMinutes = Math.round(parsed.timeFilterHours * 60);
        }

        return {
          ...defaultSettings,
          ...parsed,
          mapTheme: parsed.mapTheme || 'day',
          timeFilterMinutes,
          filters: { ...defaultSettings.filters, ...(parsed.filters || {}) }
        };
      }
    } catch(e) {}

    return defaultSettings;
  }

  function saveSettings(settings) {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }

  function loadVotes() {
    try {
      return JSON.parse(localStorage.getItem(VOTES_KEY) || '{}');
    } catch (e) {
      return {};
    }
  }

  function saveVotes(votes) {
    localStorage.setItem(VOTES_KEY, JSON.stringify(votes));
  }

  function hasVoted(pointId) {
    const votes = loadVotes();
    return !!votes[pointId];
  }

  function setVoted(pointId, type) {
    const votes = loadVotes();
    votes[pointId] = type;
    saveVotes(votes);
  }

  let settings = loadSettings();

  function applyMapTheme(theme) {
    if (currentTileLayer) {
      map.removeLayer(currentTileLayer);
    }
    currentTileLayer = L.tileLayer(mapThemes[theme].url, {
      attribution: mapThemes[theme].attribution
    }).addTo(map);
  }

  applyMapTheme(settings.mapTheme);

  const addBtn = document.getElementById('addBtn');
  const settingsBtn = document.getElementById('settingsBtn');

  const pickerBar = document.getElementById('pickerBar');
  const pickerClose = document.getElementById('pickerClose');
  const pickerItems = document.querySelectorAll('.picker-item');

  const descSheet = document.getElementById('descSheet');
  const sheetClose = document.getElementById('sheetClose');
  const sheetIcon = document.getElementById('sheetIcon');
  const sheetTitle = document.getElementById('sheetTitle');
  const descInput = document.getElementById('descInput');
  const descCounter = document.getElementById('descCounter');
  const saveBtn = document.getElementById('saveBtn');

  const settingsSheet = document.getElementById('settingsSheet');
  const settingsClose = document.getElementById('settingsClose');
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleRow = document.getElementById('themeToggleRow');
  const themeLabel = document.getElementById('themeLabel');
  const themeIcon = document.getElementById('themeIcon');
  const timeSlider = document.getElementById('timeSlider');
  const timeValue = document.getElementById('timeValue');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');

  let addMode = false;
  let selected = null;
  let temp = null;
  let currentType = 'safe';
  let data = [];
  let markers = [];
  let currentOpenPointId = null;

  function clampMinutes(value) {
    const num = Number(value) || 15;
    return Math.min(1440, Math.max(15, num));
  }

  timeSlider.value = clampMinutes(settings.timeFilterMinutes);
  updateTimeDisplay(clampMinutes(settings.timeFilterMinutes));

  function formatMinutesText(totalMinutes) {
    totalMinutes = clampMinutes(totalMinutes);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;

    if (hours === 0) return `${minutes} хв`;
    if (minutes === 0) return `${hours} год`;
    return `${hours} год ${minutes} хв`;
  }

  function updateTimeDisplay(minutes) {
    timeValue.textContent = formatMinutesText(minutes);
  }

  timeSlider.addEventListener('input', (e) => {
    updateTimeDisplay(parseInt(e.target.value, 10));
  });

  function updateFilterUI() {
    const filterIds = {
      safe: 'filterSafe',
      block: 'filterBlock',
      danger2: 'filterDanger2',
      trash: 'filterTrash'
    };

    for (const [type, id] of Object.entries(filterIds)) {
      const toggle = document.getElementById(id);
      if (!toggle) continue;

      if (settings.filters[type]) {
        toggle.classList.add('active');
      } else {
        toggle.classList.remove('active');
      }
    }
  }

  function updateThemeUI() {
    const isNight = settings.mapTheme === 'night';

    if (isNight) {
      themeToggle.classList.add('active');
      themeLabel.textContent = 'Нічна тема';
      themeIcon.textContent = '🌙';
    } else {
      themeToggle.classList.remove('active');
      themeLabel.textContent = 'Денна тема';
      themeIcon.textContent = '☀️';
    }
  }

  function initFilterToggles() {
    const filterItems = document.querySelectorAll('.filter-item[data-filter-type]');
    filterItems.forEach(item => {
      const type = item.dataset.filterType;
      const toggle = item.querySelector('.filter-toggle');

      if (toggle) {
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          settings.filters[type] = !settings.filters[type];
          updateFilterUI();
          render();
        });
      }

      item.addEventListener('click', (e) => {
        if (e.target !== toggle) {
          settings.filters[type] = !settings.filters[type];
          updateFilterUI();
          render();
        }
      });
    });
  }

  function initThemeToggle() {
    themeToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      settings.mapTheme = settings.mapTheme === 'night' ? 'day' : 'night';
      updateThemeUI();
    });

    themeToggleRow.addEventListener('click', () => {
      settings.mapTheme = settings.mapTheme === 'night' ? 'day' : 'night';
      updateThemeUI();
    });
  }

  function getIcon(type, zoom) {
    let s = zoom < 12 ? 22 : zoom < 14 ? 28 : 34;
    s = Math.round(s * 1.6);

    return L.divIcon({
      className: '',
      html: `<img src="icons/${type}.png" class="pin-img">`,
      iconSize: [s, s],
      iconAnchor: [s / 2, s / 2]
    });
  }

  function formatDateTime(t) {
    return new Date(t).toLocaleString('uk-UA', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function formatTime(t) {
    return new Date(t).toLocaleTimeString('uk-UA', {
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

function timeLeftText(createdAt) {
  const end = createdAt + LIFE;
  const left = end - Date.now();
  if (left <= 0) return 'Зникла';

  const hours = Math.floor(left / (1000 * 60 * 60));
  const minutes = Math.floor((left % (1000 * 60 * 60)) / (1000 * 60));
  return `зникне через ${hours}:${String(minutes).padStart(2, '0')} год`;
}

  function popupHtml(point, index) {
    const commentsHtml = (point.comments || []).map(c => `
      <div class="comment-item">
        <div class="comment-text">${escapeHtml(c.text)}</div>
        <div class="comment-time">${formatTime(c.time)}</div>
      </div>
    `).join('');

    const voted = hasVoted(point.id);

    return `
      <div class="radar-popup">
        <div class="popup-head">
          <div class="popup-head-left">
            <img src="icons/${point.type}.png" class="popup-icon">
            <div class="popup-meta">
              <div class="popup-title">${escapeHtml(labelMap[point.type] || point.type)}</div>
              <div class="popup-time-row">
                <div class="popup-time">${formatDateTime(point.time)}</div>
                <div class="popup-life">${timeLeftText(point.time)}</div>
              </div>
            </div>
          </div>

          <button class="popup-close" onclick="window.closePopup()">×</button>
        </div>

        <div class="popup-desc">${escapeHtml(point.desc || '')}</div>

        <div class="popup-comments-title">Коментарі</div>

        <div class="popup-comments">
          ${commentsHtml || '<div class="comment-item"><div class="comment-text">Немає коментарів</div></div>'}
        </div>

        <div class="reaction-row">
          <button class="reaction-btn like ${voted ? 'disabled' : ''}" onclick="window.vote(${index}, 'like')">👍 ${point.likes || 0}</button>
          <button class="reaction-btn dislike ${voted ? 'disabled' : ''}" onclick="window.vote(${index}, 'dislike')">👎 ${point.dislikes || 0}</button>
        </div>

        <input id="commentInput_${index}" class="popup-input" maxlength="100" placeholder="Написати коментар...">
        <div class="popup-counter" id="commentCounter_${index}">0 / 100</div>
        <button class="popup-btn" onclick="window.addComment(${index})">Додати коментар</button>
      </div>
    `;
  }

  function attachPopupInputCounter(index) {
    const input = document.getElementById(`commentInput_${index}`);
    const counter = document.getElementById(`commentCounter_${index}`);
    if (!input || !counter) return;

    input.oninput = () => {
      counter.textContent = `${input.value.length} / 100`;
    };
    counter.textContent = `${input.value.length} / 100`;
  }

  function reopenCurrentPopup() {
    if (!currentOpenPointId) return;
    const markerObj = markers.find(m => m.pointId === currentOpenPointId);
    if (markerObj?.marker) {
      markerObj.marker.openPopup();
    }
  }

  function render() {
    const previouslyOpenPointId = currentOpenPointId;

    markers.forEach(m => map.removeLayer(m.marker));
    markers = [];

    const zoom = map.getZoom();
    const now = Date.now();
    const timeLimit = clampMinutes(settings.timeFilterMinutes) * 60 * 1000;

    data.forEach((p, i) => {
      if (!settings.filters[p.type]) return;
      if (now - p.time > timeLimit) return;

      const marker = L.marker([p.lat, p.lng], {
        icon: getIcon(p.type, zoom)
      }).addTo(map);

      marker.bindPopup(popupHtml(p, i));

      marker.on('popupopen', () => {
        currentOpenPointId = p.id;
        setTimeout(() => {
          attachPopupInputCounter(i);
        }, 10);
      });

      marker.on('popupclose', () => {
        if (currentOpenPointId === p.id) {
          currentOpenPointId = null;
        }
      });

      markers.push({ marker, pointId: p.id });
    });

    if (previouslyOpenPointId) {
      currentOpenPointId = previouslyOpenPointId;
      setTimeout(() => {
        reopenCurrentPopup();
      }, 20);
    }
  }

  function updatePickerActive() {
    pickerItems.forEach(x => x.classList.remove('active'));
    document.querySelector(`.picker-item[data-type="${currentType}"]`)?.classList.add('active');
    sheetIcon.src = `icons/${currentType}.png`;
    sheetTitle.textContent = labelMap[currentType] || currentType;
    if (temp && selected) {
      temp.setIcon(getIcon(currentType, map.getZoom()));
    }
  }

  function positionSheetNearButton(sheet, button, placement = 'top') {
    const isMobile = window.innerWidth <= 600;
    const gap = 10;

    sheet.style.left = 'auto';
    sheet.style.right = 'auto';
    sheet.style.top = 'auto';
    sheet.style.bottom = 'auto';

    sheet.style.display = 'block';

    if (isMobile) {
      if (sheet === pickerBar || sheet === descSheet) {
        sheet.style.left = '8px';
        sheet.style.right = '8px';
        sheet.style.width = 'auto';
        sheet.style.bottom = '8px';
        sheet.style.top = 'auto';
        return;
      }

      if (sheet === settingsSheet) {
        sheet.style.right = '8px';
        sheet.style.top = '64px';
        sheet.style.left = 'auto';
        sheet.style.bottom = 'auto';
        return;
      }
    }

    const btnRect = button.getBoundingClientRect();
    const sheetRect = sheet.getBoundingClientRect();

    let left = btnRect.right - sheetRect.width;
    left = Math.max(8, Math.min(left, window.innerWidth - sheetRect.width - 8));

    if (placement === 'top') {
      const top = btnRect.top - sheetRect.height - gap;
      sheet.style.left = `${left}px`;
      sheet.style.top = `${Math.max(8, top)}px`;
    } else if (placement === 'bottom-right') {
      const top = btnRect.bottom + gap;
      sheet.style.left = `${left}px`;
      sheet.style.top = `${Math.max(8, top)}px`;
    }
  }

  function showPickerBar() {
    pickerBar.style.display = 'block';
    positionSheetNearButton(pickerBar, addBtn, 'top');
  }

  function showDescSheet() {
    descSheet.style.display = 'block';
    positionSheetNearButton(descSheet, addBtn, 'top');
  }

  function showSettingsSheet() {
    settingsSheet.style.display = 'block';
    positionSheetNearButton(settingsSheet, settingsBtn, 'bottom-right');
  }

  function closeCreateMode() {
    addMode = false;
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
    selected = null;
    descInput.value = '';
    descCounter.textContent = '0 / 100';
    if (temp) {
      map.removeLayer(temp);
      temp = null;
    }
  }

  window.closePopup = function() {
    map.closePopup();
  };

  window.vote = async function(index, type) {
    const item = data[index];
    if (!item?.id) return;
    if (hasVoted(item.id)) return;

    const ref = doc(db, "points", item.id);

    if (type === 'like') {
      await updateDoc(ref, {
        likes: (item.likes || 0) + 1
      });
    } else {
      await updateDoc(ref, {
        dislikes: (item.dislikes || 0) + 1
      });
    }

    setVoted(item.id, type);
    currentOpenPointId = item.id;
  };

  window.addComment = async function(index) {
    const input = document.getElementById(`commentInput_${index}`);
    if (!input) return;

    const text = input.value.trim();
    if (!text) return alert('Коментар обовʼязковий');
    if (text.length > 100) return alert('Максимум 100 символів');

    const item = data[index];
    if (!item?.id) return;

    const ref = doc(db, "points", item.id);
    const newComments = [
      ...(item.comments || []),
      { text, time: Date.now() }
    ];

    currentOpenPointId = item.id;
    await updateDoc(ref, { comments: newComments });
  };

  pickerItems.forEach(el => {
    el.addEventListener('click', () => {
      currentType = el.dataset.type;
      updatePickerActive();
    });
  });

  addBtn.addEventListener('click', () => {
    addMode = true;
    settingsSheet.style.display = 'none';
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
    showPickerBar();
  });

  settingsBtn.addEventListener('click', () => {
    pickerBar.style.display = 'none';
    descSheet.style.display = 'none';
    showSettingsSheet();
  });

  pickerClose.addEventListener('click', closeCreateMode);
  sheetClose.addEventListener('click', closeCreateMode);
  settingsClose.addEventListener('click', () => {
    settingsSheet.style.display = 'none';
  });

  saveSettingsBtn.addEventListener('click', () => {
    settings.timeFilterMinutes = clampMinutes(parseInt(timeSlider.value, 10));
    saveSettings(settings);
    applyMapTheme(settings.mapTheme);
    render();
    settingsSheet.style.display = 'none';
  });

  descInput.addEventListener('input', () => {
    descCounter.textContent = `${descInput.value.length} / 100`;
  });

  map.on('click', e => {
    if (!addMode) return;

    selected = e.latlng;

    if (temp) {
      map.removeLayer(temp);
    }

    temp = L.marker(selected, {
      icon: getIcon(currentType, map.getZoom())
    }).addTo(map);

    updatePickerActive();
    pickerBar.style.display = 'none';
    showDescSheet();
  });

  saveBtn.addEventListener('click', async () => {
    const desc = descInput.value.trim();

    if (!selected) return alert('Ткни на карту');
    if (!desc) return alert("Опис обов'язковий");
    if (desc.length > 100) return alert('Максимум 100 символів');

    await addDoc(collection(db, "points"), {
      lat: selected.lat,
      lng: selected.lng,
      type: currentType,
      desc,
      time: Date.now(),
      comments: [],
      likes: 0,
      dislikes: 0
    });

    closeCreateMode();
  });

  map.on('zoomend', () => {
    render();
  });

  window.addEventListener('resize', () => {
    if (pickerBar.style.display === 'block') showPickerBar();
    if (descSheet.style.display === 'block') showDescSheet();
    if (settingsSheet.style.display === 'block') showSettingsSheet();
  });

  const pointsQuery = query(collection(db, "points"), orderBy("time", "desc"));

  onSnapshot(pointsQuery, (snapshot) => {
    data = [];
    snapshot.forEach((itemDoc) => {
      const point = { id: itemDoc.id, ...itemDoc.data() };

      if (Date.now() - point.time < LIFE) {
        data.push(point);
      }
    });

    render();
  });

  updateFilterUI();
  updateThemeUI();
  initFilterToggles();
  initThemeToggle();
  updatePickerActive();
  render();
</script>

</body>
</html>
